name: CI - Bash Quality Checks

on:
  push:
    branches: [ main, develop, 'release/*' ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  syntax-check:
    name: Bash Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Check Bash syntax
        run: |
          echo "Bash version: $(bash --version | head -1)"
          echo ""
          echo "Running syntax check on noid-privacy-linux.sh..."
          bash -n noid-privacy-linux.sh

          echo "Running syntax check on entrypoint.sh..."
          bash -n entrypoint.sh

          echo ""
          echo "✅ Syntax check passed!"

  shellcheck:
    name: ShellCheck Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck (warning level)
        run: |
          echo "ShellCheck version: $(shellcheck --version | head -2 | tail -1)"
          echo ""
          shellcheck --severity=warning --shell=bash --format=tty noid-privacy-linux.sh
          shellcheck --severity=warning --shell=bash --format=tty entrypoint.sh
          echo ""
          echo "✅ ShellCheck (warning) passed!"

      - name: Run ShellCheck (style — non-blocking)
        continue-on-error: true
        run: |
          echo "Style-level issues (informational, non-blocking):"
          shellcheck --severity=style --shell=bash --format=tty noid-privacy-linux.sh || true

  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Check required files
        run: |
          echo "Checking project structure..."

          failed=0
          for f in README.md LICENSE CHANGELOG.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md noid-privacy-linux.sh Docs/CHECKS.md; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f (MISSING)"
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "❌ Missing required files!"
            exit 1
          else
            echo ""
            echo "✅ All required files present!"
          fi

      - name: Verify script header
        run: |
          head -1 noid-privacy-linux.sh | grep -qE '^#!(/bin/bash|/usr/bin/env bash)' \
            && echo "✅ Shebang present" \
            || { echo "❌ Missing shebang"; exit 1; }

  syntax-compat:
    name: Bash Syntax Compat (${{ matrix.name }})
    # Renamed from "distro-test" to honest scope: this only checks bash syntax
    # compatibility across distros, NOT actual cross-distro audit logic.
    # Real cross-distro testing requires running the audit (see audit-smoke job).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu:22.04
            name: Ubuntu 22.04
          - distro: ubuntu:24.04
            name: Ubuntu 24.04
          - distro: fedora:42
            name: Fedora 42
          - distro: fedora:43
            name: Fedora 43
          - distro: debian:12
            name: Debian 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Test syntax on ${{ matrix.name }}
        run: |
          docker run --rm -v "$PWD:/audit:ro" "${{ matrix.distro }}" \
            bash -n /audit/noid-privacy-linux.sh
          echo "✅ Bash syntax compatible on ${{ matrix.name }}"

  audit-smoke:
    name: Audit Smoke Test (Ubuntu)
    # Real-run smoke test: install deps, run audit with skips for sections
    # requiring root capabilities not available in containers, validate JSON.
    # This catches regressions that syntax-compat misses.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc curl iproute2 jq net-tools

      - name: Run audit (offline mode, skip root-required sections)
        run: |
          # Run with --offline (no network leak tests) and skip sections
          # requiring sudo on /etc/shadow etc. Validate JSON parses cleanly.
          # F-007 exit codes (since v3.5.0): 0=clean, 1=FAIL present, 2=WARN-only.
          # Ubuntu CI runners are unhardened so FAILs are EXPECTED — only
          # treat unexpected exit codes (>2 except signal-induced 130/143)
          # as smoke-test failures. Disable `set -e` for the audit run.
          set +e
          sudo bash noid-privacy-linux.sh --json --offline \
            --skip rootkit --skip audit --skip integrity \
            > /tmp/audit.json
          AUDIT_RC=$?
          set -e
          echo "Audit exit code: $AUDIT_RC"
          case "$AUDIT_RC" in
            0|1|2) ;;            # F-007 valid (clean / FAIL / WARN-only)
            130|143) ;;          # Signal-interrupted (F-008)
            *) echo "::error::Audit unexpectedly exited with rc=$AUDIT_RC"
               head -50 /tmp/audit.json
               exit 1 ;;
          esac
          jq . /tmp/audit.json > /dev/null
          echo "✅ Audit produces valid JSON"
          jq -r '.summary | "Score: \(.score)% — \(.pass) pass, \(.fail) fail, \(.warn) warn"' /tmp/audit.json
