# Fixture: NetworkManager conf.d drop-in using a HYPHEN-suffixed connection-
# default section. [connection-<name>] is NM's own canonical example
# (NetworkManager.conf(5): [connection-wifi-wlan0]). The interim F-385 dot-only
# regex [connection[].] missed this form; the final '^\[connection' rule
# (matches any section starting with "connection") covers bare, dot AND hyphen.
[connection-ethernet-mac]
match-device=type:ethernet
ethernet.cloned-mac-address=stable
