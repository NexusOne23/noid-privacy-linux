# Fixture: NetworkManager conf.d drop-in using a NAMED connection-default
# section ([connection.<name>] takes a dotted suffix so several match-device
# defaults can coexist). This is the form NoID Privacy ships and the case the
# pre-F-385 '/^\[connection\]/' parser silently missed (false negative).
[device]
wifi.scan-rand-mac-address=yes

[connection.noid-ethernet-mac]
match-device=type:ethernet
ethernet.cloned-mac-address=stable
ethernet.wake-on-lan=ignore
